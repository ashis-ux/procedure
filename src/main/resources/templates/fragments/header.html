<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<script th:inline="javascript">
	window.contextPath = /*[[@{/}]]*/ '';
</script>

<body class="headercss">

	<div th:fragment="header(activeMenu)">

		<nav class="navbar navbar-expand-lg navbar-dark header-navbar  ">

			<div class="container-fluid">

				<!-- Logo & Title -->
				<div class="navbar-brand d-flex align-items-center mb-0">

					<img th:src="@{/images/sail-logo.png}" alt="SAIL Logo" width="42" height="42"
						class="me-2 rounded-circle bg-white p-1">

					<span class="fw-bold fs-4 text-white">
						Procedure Gateway
					</span>

				</div>

				<!-- Mobile Toggle -->
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
					aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">

					<span class="navbar-toggler-icon"></span>

				</button>

				<!-- Navbar Content -->
				<div class="collapse navbar-collapse" id="navbarMenu">

					<!-- Left Menu Buttons -->
					<div class="d-flex ms-4 me-auto">

					    <a class="btn btn-outline-light me-2"
					       th:href="@{/database/search}">
					        <i class="bi bi-hdd-network me-1"></i>
					        Database Master
					    </a>


					    <a class="btn btn-outline-light me-2"
					       th:href="@{/procedure/search}">
					        <i class="bi bi-diagram-3 me-1"></i>
					        Procedure Master
					    </a>


					    <a class="btn btn-outline-light"
					       th:href="@{/client/client-master}">
					        <i class="bi bi-people me-1"></i>
					        Client Master
					    </a>

					</div>

					<!-- Right Buttons -->
					<div class="d-flex">

						<button class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#exitModal">
							<i class="bi bi-box-arrow-left me-1"></i>
							Exit
						</button>

						<button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#logoutModal">
							<i class="bi bi-box-arrow-right me-1"></i>
							Logout
						</button>

					</div>

				</div>

			</div>

		</nav>

	 

	<!-- Exit Modal -->
	<div class="modal fade" id="exitModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">Confirm Exit</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					Are you sure you want to exit?
				</div>

				<div class="modal-footer">

					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
						No
					</button>

					<a th:href="@{/api/forward/dashboard}" class="btn btn-danger">
						Yes, Exit
					</a>

				</div>

			</div>
		</div>
	</div>

	<!-- Logout Modal -->
	<div class="modal fade" id="logoutModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">Confirm Logout</h5>

					<button type="button" class="btn-close" data-bs-dismiss="modal">
					</button>
				</div>

				<div class="modal-body">
					Are you sure you want to logout?
				</div>

				<div class="modal-footer">

					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
						No
					</button>

					<a th:href="@{/api/forward/logout}" class="btn btn-danger">
						Yes, Logout
					</a>

				</div>

			</div>
		</div>
	</div>
	
	</div>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
